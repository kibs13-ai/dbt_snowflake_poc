    #   personal_* / prd -> DB_TVN_AD_SALES_LOAD_STAGE_PRD
    #   dev              -> DB_TVN_AD_SALES_LOAD_STAGE_DEV
    database: "{{ source_database_for_target() }}"
    schema: SCH_SRC
    config:
      meta:
        bkcc: 'SALESFORCE'
        record_source: 'SALESFORCE'
