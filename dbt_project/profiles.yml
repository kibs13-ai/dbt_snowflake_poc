# dbt Projects on Snowflake wymaga profiles.yml w folderze projektu.
# type musi być 'snowflake'; account i user mogą zostać puste ('not needed')
# — projekt uruchamia się w kontekście bieżącego konta/użytkownika Snowflake.
#
# WAŻNE: schema podana w profiles.yml musi ISTNIEĆ w Snowflake przed
# `EXECUTE DBT PROJECT` (dbt on Snowflake nie tworzy schematów automatycznie).
#
# Targety personal_<login>:
#   Każdy dev ma własny target z hardcoded schema = jego login Snowflake
#   (lowercase). W Workspace ustaw `--target personal_<login>` jako default args
#   — wtedy nie trzeba go podawać per komenda.
#   Nowy dev = +7 linijek tutaj + jedno uruchomienie 02_onboard_dev.sql.
dbt_snowflake_poc:
  target: personal_jakub             # default; pozostali devy nadpisują w args Workspace
  outputs:

    # ---------- PERSONAL (per dev) ----------
    personal_jakub:
      type: snowflake
      account: 'not needed'
      user: 'not needed'
      role: DBT_POC_DEV
      database: PERSONAL_DEVELOPMENT
      schema: jakub_wojciechowski    # login Snowflake (lowercase)
      warehouse: WH_DBT_POC_DEV
      threads: 8

    # Szablon dla kolejnego dewelopera — odkomentować + podstawić login:
    # personal_<login>:
    #   type: snowflake
    #   account: 'not needed'
    #   user: 'not needed'
    #   role: DBT_POC_DEV
    #   database: PERSONAL_DEVELOPMENT
    #   schema: <login>
    #   warehouse: WH_DBT_POC_DEV
    #   threads: 8

    # ---------- DEV (shared) ----------
    dev:
      type: snowflake
      account: 'not needed'
      user: 'not needed'
      role: DBT_POC_DEV
      database: DBT_POC_DEV
      schema: DEV
      warehouse: WH_DBT_POC_DEV
      threads: 8
    prd:
      type: snowflake
      account: 'not needed'
      user: 'not needed'
      role: DBT_POC_PRD
      database: DBT_POC_PRD
      schema: PRD
      warehouse: WH_DBT_POC_PRD
      threads: 8
